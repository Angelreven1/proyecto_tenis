<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Smart Tennis Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <h2>Iniciar Sesión</h2>
        <hr>
        
        <form id="form-login">
            <div class="form-group">
                <label for="input-correo">Correo Electrónico</label>
                <input type="email" id="input-correo" placeholder="ejemplo@tenis.com" required>
            </div>

            <div class="form-group">
                <label for="input-pass">Contraseña</label>
                <input type="password" id="input-pass" placeholder="********" required>
            </div>

            <button type="submit" class="btn-submit">Entrar al Sistema</button>
            
            <div id="mensaje-error" style="color: #ff4d4d; font-weight: bold; margin-top: 15px; text-align: center;"></div>
        </form>
    </div>

    <script src="login.js"></script>
</body>
</html>
